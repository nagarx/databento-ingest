# OPRA definition INDEX options — SPX + SPY + SPXW (the instrument_id -> contract JOIN KEY).
# Batch job OPRA-20260619-QR84JH7MYA, Databento account RCKQA83F.
#
# ⚠ DELIVERY NOTE: unlike the sibling cbbo-1m / statistics sets (downloaded by this tool), the 19
#   definition files were delivered PRE-DOWNLOADED via the Databento portal and were verified-in-place
#   2026-06-19 (19/19 size + SHA-256 vs this manifest; condition.json byte-matched the live server).
#   This config is retained for reproducibility (re-download / `verify --config`); the data already sits
#   at output_dir.
#
# WHY: this is the JOIN KEY for BOTH OPRA INDEX sets. With map_symbols=false the cbbo-1m quotes and the
#   statistics/OI rows carry only numeric instrument_id; the definition schema (StatMsg? no — InstrumentDefMsg,
#   rtype 19) maps each instrument_id -> {raw_symbol(OCC), underlying, strike_price, expiration,
#   instrument_class(C/P)}. OPRA REMAPS instrument_id DAILY, so the join is point-in-time per day — which is
#   exactly why this is split_duration=day and uses the SAME dataset/symbols/stype as the data sets.
#   ONE definition pull serves BOTH the cbbo-1m and statistics sets.
#
# SCOPE: same 3 index-option underlyings, parent symbology (stype_in=parent, stype_out=instrument_id,
#   map_symbols=false, split_symbols=false). 19 daily files (opra-pillar-YYYYMMDD.definition.dbn.zst),
#   Σ 26,086,719 bytes (24.88 MiB), span 2025-10-29 .. 2025-11-24.
#   NOTE: end = 2025-11-25 00:00 UTC (exclusive) → a COMPLETE 11/24 (full instrument set), deliberately
#   NOT the 08:30-ET pre-open cut the cbbo-1m/statistics jobs used — for the id map you want every
#   instrument active that day. So the 11/24 definition file is full-size (~1.42 MB), not a sliver.
#
# Source bundle preserved at: databento-ingest/jobs/OPRA-20260619-QR84JH7MYA/ (gitignored) and the SSD
#   output dir's _provenance/.  Secrets: the API key lives ONLY in gitignored credentials.toml.

